<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MegaText</title>
  <style>
    :root {
      --bg: #111827;
      --panel: #1f2937;
      --text: #ffffff;
      --muted: #9ca3af;
      --accent: #38bdf8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    .controls {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      padding: 16px 76px 16px 16px;
      background: var(--panel);
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.25);
      transform: translateY(-100%);
      transition: transform 0.25s ease;
    }

    .controls.is-open {
      transform: translateY(0);
    }

    .controls-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 20;
      width: 44px;
      height: 44px;
      padding: 0;
      border: 0;
      border-radius: 50%;
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.35);
      transition: background 0.2s, color 0.2s, transform 0.25s ease;
    }

    .controls-toggle:hover {
      background: var(--accent);
      color: #082f49;
    }

    .controls-toggle svg {
      width: 22px;
      height: 22px;
      transition: transform 0.3s ease;
    }

    .controls-toggle.is-open svg {
      transform: rotate(60deg);
    }

    button {
      padding: 14px 18px;
      border: 0;
      border-radius: 12px;
      background: var(--accent);
      color: #082f49;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
    }

    button.secondary {
      background: #374151;
      color: white;
    }

    label {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    input[type="range"] {
      width: 140px;
    }

    .display {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      text-align: center;
      overflow: hidden;
    }

    #bigText {
      font-size: clamp(48px, 12vw, 180px);
      line-height: 1.2;
      font-weight: 900;
      letter-spacing: 0.02em;
      white-space: pre;
      word-break: keep-all;
      cursor: text;
      outline: none;
      caret-color: transparent;
    }

    #bigText:focus {
      caret-color: var(--accent);
    }

    #bigText.is-empty::before {
      content: attr(data-placeholder);
      color: var(--muted);
      opacity: 0.5;
    }

    #bigText.is-empty br {
      display: none;
    }

    #bigText.is-empty:not(:focus)::after {
      content: '|';
      color: var(--accent);
      margin-left: 0.04em;
      animation: caret-blink 1s step-end infinite;
    }

    @keyframes caret-blink {
      50% { opacity: 0; }
    }

    .fullscreen #bigText {
      cursor: pointer;
    }

    .fullscreen #bigText::after {
      display: none;
    }

    .fullscreen .controls,
    .fullscreen .controls-toggle {
      display: none;
    }

    .fullscreen .display {
      min-height: 100vh;
      cursor: pointer;
    }

    .fullscreen .display::after {
      content: 'Kliknutím ukončíte režim celé obrazovky';
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      font-size: 13px;
      font-weight: 400;
      padding: 6px 14px;
      border-radius: 8px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .fullscreen .display:hover::after {
      opacity: 1;
    }

    .light {
      --bg: #ffffff;
      --panel: #f3f4f6;
      --text: #111827;
      --muted: #4b5563;
    }

    footer {
      text-align: center;
      padding: 10px 16px 18px;
      font-size: 12px;
      color: var(--muted);
    }
	
    footer a {
      color: #fde68a;
      text-decoration: none;
    }

    .light footer a {
      color: var(--accent);
    }

    footer a:hover {
      text-decoration: underline;
    }

    .fullscreen footer {
      display: none;
    }

    @media (max-width: 760px) {
      input[type="range"] {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <button id="controlsToggle" class="controls-toggle" type="button" aria-controls="controlsBar" aria-expanded="false" aria-label="Zobrazit nastavení">

    </svg>
  </button>

  <div class="controls" id="controlsBar">
    <label>
      Velikost písma
      <input id="sizeInput" type="range" min="40" max="320" value="220" />
    </label>

    <button id="themeButton" class="secondary">Světlý režim</button>
    <button id="fullscreenButton">Celá obrazovka</button>
  </div>

  <main class="display" id="displayArea">
    <div
      id="bigText"
      contenteditable="true"
      spellcheck="false"
      autocorrect="off"
      autocapitalize="off"
      data-placeholder="MegaText.cz"
      class="is-empty"
    ></div>
  </main>

  <footer>
    <p>Vytvořil a provozuje <a href="https://manena.info">Václav Maněna</a>. Jestli chcete, <a href="https://buymeacoffee.com/vmanena">kupte mu kafe</a>.</p> 
	<p><a href="about.html">O aplikaci a nápověda</a></p>
  </footer>

  <script>
    const sizeInput = document.getElementById('sizeInput');
    const bigText = document.getElementById('bigText');
    const fullscreenButton = document.getElementById('fullscreenButton');
    const themeButton = document.getElementById('themeButton');
    const displayArea = document.getElementById('displayArea');
    const controlsBar = document.getElementById('controlsBar');
    const controlsToggle = document.getElementById('controlsToggle');

    function setControlsOpen(open) {
      controlsBar.classList.toggle('is-open', open);
      controlsToggle.classList.toggle('is-open', open);
      controlsToggle.setAttribute('aria-expanded', String(open));
      controlsToggle.setAttribute('aria-label', open ? 'Skrýt nastavení' : 'Zobrazit nastavení');
    }

    controlsToggle.addEventListener('click', (event) => {
      event.stopPropagation();
      setControlsOpen(!controlsBar.classList.contains('is-open'));
    });

    document.addEventListener('click', (event) => {
      if (!controlsBar.classList.contains('is-open')) return;
      if (controlsBar.contains(event.target) || controlsToggle.contains(event.target)) return;
      setControlsOpen(false);
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && controlsBar.classList.contains('is-open')) {
        setControlsOpen(false);
      }
    });

    const STORAGE_KEYS = {
      text: 'megatext:text',
      size: 'megatext:size',
      theme: 'megatext:theme',
    };

    function safeGet(key) {
      try {
        return localStorage.getItem(key);
      } catch (error) {
        return null;
      }
    }

    function safeSet(key, value) {
      try {
        localStorage.setItem(key, value);
      } catch (error) {
        // localStorage může být zakázané (např. privátní režim).
      }
    }

    function loadSavedText() {
      const saved = safeGet(STORAGE_KEYS.text);
      if (saved) {
        bigText.innerText = saved;
      }
    }

    function saveText() {
      safeSet(STORAGE_KEYS.text, bigText.innerText);
    }

    function loadSavedSize() {
      const saved = safeGet(STORAGE_KEYS.size);
      if (saved) {
        sizeInput.value = saved;
      }
    }

    function saveSize() {
      safeSet(STORAGE_KEYS.size, sizeInput.value);
    }

    function loadSavedTheme() {
      const saved = safeGet(STORAGE_KEYS.theme);
      if (saved === 'light') {
        document.body.classList.add('light');
        themeButton.textContent = 'Tmavý režim';
      }
    }

    function saveTheme() {
      const theme = document.body.classList.contains('light') ? 'light' : 'dark';
      safeSet(STORAGE_KEYS.theme, theme);
    }

    function fitText() {
      const maxSize = Number(sizeInput.value);
      const minSize = 24;

      let fontSize = maxSize;
      bigText.style.fontSize = `${fontSize}px`;

      while (
        fontSize > minSize &&
        (
          bigText.scrollWidth > displayArea.clientWidth - 40 ||
          bigText.scrollHeight > displayArea.clientHeight - 40
        )
      ) {
        fontSize -= 2;
        bigText.style.fontSize = `${fontSize}px`;
      }
    }

    function updateEmptyState() {
      bigText.classList.toggle('is-empty', bigText.textContent.length === 0);
    }

    function handleInput() {
      updateEmptyState();
      fitText();
      saveText();
    }

    bigText.addEventListener('input', handleInput);

    bigText.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        event.preventDefault();
        document.execCommand('insertLineBreak');
      }
    });

    bigText.addEventListener('paste', (event) => {
      event.preventDefault();
      const text = (event.clipboardData || window.clipboardData).getData('text');
      document.execCommand('insertText', false, text);
    });

    sizeInput.addEventListener('input', () => {
      fitText();
      saveSize();
    });

    fullscreenButton.addEventListener('click', async () => {
      setControlsOpen(false);
      document.body.classList.add('fullscreen');
      bigText.setAttribute('contenteditable', 'false');
      bigText.blur();

      if (document.documentElement.requestFullscreen) {
        try {
          await document.documentElement.requestFullscreen();
        } catch (error) {
          // Prohlížeč může fullscreen zablokovat. Stránka i tak skryje ovládání.
        }
      }
    });

    displayArea.addEventListener('click', async () => {
      if (document.body.classList.contains('fullscreen')) {
        document.body.classList.remove('fullscreen');
        bigText.setAttribute('contenteditable', 'true');

        if (document.fullscreenElement && document.exitFullscreen) {
          await document.exitFullscreen();
        }
      }
    });

    themeButton.addEventListener('click', () => {
      document.body.classList.toggle('light');
      themeButton.textContent = document.body.classList.contains('light')
        ? 'Tmavý režim'
        : 'Světlý režim';

      saveTheme();
      fitText();
    });

    window.addEventListener('resize', fitText);

    loadSavedTheme();
    loadSavedSize();
    loadSavedText();
    updateEmptyState();
    fitText();
  </script>
</body>
</html>
